# =============================================================================
# KUBERNETES SECRETS FOR WORDPRESS (AKS)
# =============================================================================
# Same structure as GKE, but can integrate with Azure Key Vault
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  namespace: wordpress
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
type: Opaque
data:
  mysql-root-password: cm9vdC1wYXNzd29yZC1jaGFuZ2UtbWU=
  mysql-password: d29yZHByZXNzLXBhc3N3b3JkLWNoYW5nZS1tZQ==
  mysql-replication-password: cmVwbGljYXRpb24tcGFzc3dvcmQ=
---
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-secrets
  namespace: wordpress
  labels:
    app.kubernetes.io/name: wordpress
    app.kubernetes.io/component: application
type: Opaque
data:
  db-password: d29yZHByZXNzLXBhc3N3b3JkLWNoYW5nZS1tZQ==
stringData:
  db-user: "wordpress"
  db-name: "wordpress"
  db-host: "mysql-0.mysql-headless.wordpress.svc.cluster.local"
---
# SecretProviderClass for Azure Key Vault integration (recommended)
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: azure-keyvault-secrets
  namespace: wordpress
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: ""  # Leave empty to use system-assigned identity
    keyvaultName: "wordpress-kv"  # REPLACE with your Key Vault name
    objects: |
      array:
        - |
          objectName: mysql-root-password
          objectType: secret
        - |
          objectName: mysql-password
          objectType: secret
    tenantId: ""  # REPLACE with your tenant ID
  secretObjects:
    - secretName: mysql-secrets-kv
      type: Opaque
      data:
        - objectName: mysql-root-password
          key: mysql-root-password
        - objectName: mysql-password
          key: mysql-password