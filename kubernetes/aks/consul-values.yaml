# =============================================================================
# CONSUL HELM VALUES FOR AKS
# =============================================================================
# Install with: helm install consul hashicorp/consul -f consul-values.yaml -n consul --create-namespace
# =============================================================================

global:
  name: consul
  datacenter: azure-eastasia
  
  tls:
    enabled: true
    enableAutoEncrypt: true
    verify: true
    caCert:
      secretName: consul-federation  # From GCP
      secretKey: caCert
    caKey:
      secretName: consul-federation
      secretKey: caKey
  
  gossipEncryption:
    secretName: consul-federation
    secretKey: gossipEncryptionKey
  
  federation:
    enabled: true
  
  acls:
    manageSystemACLs: true
    replicationToken:
      secretName: consul-federation
      secretKey: replicationToken

server:
  replicas: 3
  storage: 10Gi
  storageClass: azure-premium-retain
  
  extraConfig: |
    {
      "connect": {
        "enabled": true
      },
      "primary_datacenter": "gcp-asia-east2",
      "retry_join_wan": ["<GCP_MESH_GATEWAY_IP>"]
    }

client:
  enabled: true
  grpc: true

connectInject:
  enabled: true
  default: false
  transparentProxy:
    defaultEnabled: true

controller:
  enabled: true

meshGateway:
  enabled: true
  replicas: 1
  wanAddress:
    source: Service
  service:
    type: LoadBalancer