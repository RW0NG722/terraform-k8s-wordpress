# =============================================================================
# GKE MANAGED CERTIFICATE
# =============================================================================
# Google-managed SSL certificate for HTTPS.
# This automatically provisions and renews the certificate.
#
# PREREQUISITES:
#   1. Domain must point to the Ingress IP
#   2. DNS propagation must be complete
#
# APPLY WITH: kubectl apply -f managed-certificate.yaml
# =============================================================================

apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: wordpress-certificate
  namespace: wordpress
  labels:
    app.kubernetes.io/name: wordpress
    app.kubernetes.io/component: certificate
spec:
  domains:
    - wordpress.example.com  # REPLACE with your domain
    # Add more domains if needed:
    # - www.wordpress.example.com
---
# FrontendConfig for HTTP to HTTPS redirect
apiVersion: networking.gke.io/v1beta1
kind: FrontendConfig
metadata:
  name: wordpress-frontend-config
  namespace: wordpress
spec:
  # Redirect HTTP to HTTPS
  redirectToHttps:
    enabled: true
    responseCodeName: MOVED_PERMANENTLY_DEFAULT  # 301 redirect
  
  # SSL Policy (optional - for stricter SSL settings)
  # sslPolicy: gke-ingress-ssl-policy