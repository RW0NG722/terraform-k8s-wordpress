# =============================================================================
# KUBERNETES SECRETS FOR WORDPRESS
# =============================================================================
# This file contains sensitive information for the WordPress application.
# 
# IMPORTANT: 
#   - Never commit actual secrets to version control!
#   - Replace the base64 encoded values with your own
#   - Consider using external secret management (HashiCorp Vault, GCP Secret Manager)
#
# To create base64 encoded values:
#   echo -n 'your-password' | base64
#
# APPLY WITH: kubectl apply -f secrets.yaml
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: mysql-secrets
  namespace: wordpress
  labels:
    app.kubernetes.io/name: mysql
    app.kubernetes.io/component: database
type: Opaque
data:
  # REPLACE THESE WITH YOUR OWN BASE64 ENCODED VALUES!
  # echo -n 'your-root-password' | base64
  mysql-root-password: cm9vdC1wYXNzd29yZC1jaGFuZ2UtbWU=  # root-password-change-me
  # echo -n 'your-wordpress-password' | base64
  mysql-password: d29yZHByZXNzLXBhc3N3b3JkLWNoYW5nZS1tZQ==  # wordpress-password-change-me
  # echo -n 'your-replication-password' | base64
  mysql-replication-password: cmVwbGljYXRpb24tcGFzc3dvcmQ=  # replication-password
---
apiVersion: v1
kind: Secret
metadata:
  name: wordpress-secrets
  namespace: wordpress
  labels:
    app.kubernetes.io/name: wordpress
    app.kubernetes.io/component: application
type: Opaque
data:
  # WordPress database password (same as mysql-password above)
  db-password: d29yZHByZXNzLXBhc3N3b3JkLWNoYW5nZS1tZQ==
stringData:
  # These can be stored as plain text in stringData (Kubernetes will encode them)
  db-user: "wordpress"
  db-name: "wordpress"
  db-host: "mysql-0.mysql-headless.wordpress.svc.cluster.local"
---
